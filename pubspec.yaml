name: utd_store_rival
description: "UTD Store & Crypto Hub - Mochammad Rival Sopyan"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Networking
  dio: ^5.4.1
  pretty_dio_logger: ^1.4.0
  # DI
  get_it: ^7.6.7
  # State Management
  flutter_bloc: ^8.1.5
  # Routing
  go_router: ^13.2.0
  # Local Storage (replaces Isar - cross-platform web+mobile)
  shared_preferences: ^2.2.3
  # Date/Time formatting
  intl: ^0.19.0
  # WebSocket for crypto
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
